<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up — Inkwell</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-container">
    <h1>Inkwell</h1>
    <div class="card">
      <h2>Create an account</h2>
      <form id="form-signup">
        <div class="form-group">
          <label for="username">Username</label>
          <input name="username" id="username" type="text" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input name="password" id="password" type="password" autocomplete="new-password" required>
        </div>
        <button type="submit">Create account</button>
        <p id="err" class="error-msg"></p>
      </form>
    </div>
    <p>Already have an account? <a href="/login">Log in</a></p>
  </div>
  <script>
    document.getElementById('form-signup').addEventListener('submit', async function(ev) {
      ev.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var err = document.getElementById('err');
      err.textContent = '';
      try {
        var resp = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        if (!resp.ok) { err.textContent = 'Signup failed. Username may already be taken.'; return; }
        var data = await resp.json();
        localStorage.setItem('token', data.session_token);
        window.location.href = '/';
      } catch (e) {
        err.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
