server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $api_host "api:8080";

    location /api/ {
        proxy_pass http://$api_host/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://$api_host/healthz;
    }

    # serve user.html for /users/{username}
    location ~ ^/users/[^/]+$ {
        try_files $uri /user.html;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
