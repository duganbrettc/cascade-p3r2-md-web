server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver; defers upstream resolution so nginx
    # starts even when the api container is not yet up.
    resolver 127.0.0.11 valid=5s;

    # API proxy
    location /api/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check proxy
    location /healthz {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream/healthz;
    }

    # Static assets
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA-style routing: serve HTML files for clean URLs
    location = / {
        try_files /index.html =404;
    }
    location = /signup {
        try_files /signup.html =404;
    }
    location = /login {
        try_files /login.html =404;
    }
    location = /post {
        try_files /post.html =404;
    }
    location = /profile {
        try_files /profile.html =404;
    }
    location = /users {
        try_files /users.html =404;
    }
    location ~ ^/users/(.+)$ {
        try_files /user.html =404;
    }

    # Default
    location / {
        try_files $uri $uri.html =404;
    }
}
