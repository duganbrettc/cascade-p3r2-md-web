<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkwell — Sign Up</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="container auth-box">
    <h1>Create an account</h1>
    <form id="signupForm" novalidate>
      <div>
        <label for="username">Username</label>
        <input name="username" type="text" id="username" required autocomplete="username">
      </div>
      <div>
        <label for="password">Password</label>
        <input name="password" type="password" id="password" required autocomplete="new-password">
      </div>
      <button type="submit" id="signupBtn">Sign Up</button>
      <p id="errorMsg" class="msg-error" role="alert" aria-live="polite"></p>
    </form>
    <p style="margin-top:16px">Already have an account? <a href="/login">Log in</a></p>
  </main>

  <script>
    (function() {
      var errorMsg = document.getElementById('errorMsg');
      var signupBtn = document.getElementById('signupBtn');

      function doSignup() {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        errorMsg.textContent = '';
        if (!username || !password) { errorMsg.textContent = 'Please fill in all fields.'; return; }

        fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
        .then(function(res) {
          if (!res.ok) {
            return res.text().then(function(t) { throw new Error(t || 'Signup failed'); });
          }
          return res.json();
        })
        .then(function(data) {
          localStorage.setItem('token', data.session_token);
          window.location.href = '/';
        })
        .catch(function(err) {
          errorMsg.textContent = err.message || 'Signup failed. Try a different username.';
        });
      }

      signupBtn.addEventListener('mousedown', function(evt) {
        evt.preventDefault();
        doSignup();
      });

      document.getElementById('signupForm').addEventListener('keydown', function(evt) {
        if (evt.key === 'Enter') { evt.preventDefault(); doSignup(); }
      });
    }());
  </script>
</body>
</html>
