<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkwell — Timeline</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav>
    <span class="nav-title">Inkwell</span>
    <a href="/" aria-current="page">Timeline</a>
    <a href="/post">New Post</a>
    <a href="/profile">Profile</a>
    <a href="/users">Users</a>
    <button class="nav-btn" id="logoutBtn">Logout</button>
  </nav>

  <main class="container">
    <h1>Timeline</h1>
    <section id="feed" aria-label="Post feed">
      <p id="loadingMsg">Loading...</p>
    </section>
  </main>

  <script src="/static/js/md.js"></script>
  <script>
    (function() {
      var token = localStorage.getItem('token') || localStorage.getItem('session_token');
      if (!token) { window.location.href = '/login'; return; }

      document.getElementById('logoutBtn').addEventListener('mousedown', function() {
        localStorage.removeItem('token');
        localStorage.removeItem('session_token');
        window.location.href = '/login';
      });

      var feed = document.getElementById('feed');
      var loadingMsg = document.getElementById('loadingMsg');

      fetch('/api/timeline', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function(res) {
        if (res.status === 401) { window.location.href = '/login'; return null; }
        return res.json();
      })
      .then(function(posts) {
        if (!posts) return;
        loadingMsg.remove();
        if (posts.length === 0) {
          feed.innerHTML = '<p>Nothing here yet. <a href="/users">Follow some users</a> to see their posts.</p>';
          return;
        }
        posts.forEach(function(post) {
          var card = document.createElement('article');
          card.className = 'card post-card';
          var name = post.display_name || post.username;
          var date = new Date(post.created_at).toLocaleString();
          card.innerHTML =
            '<div class="meta"><a href="/users/' + encodeURIComponent(post.username) + '">' +
            escHtml(name) + '</a> &middot; <span>' + date + '</span></div>' +
            '<div class="body">' + renderMarkdown(post.body) + '</div>';
          feed.appendChild(card);
        });
      })
      .catch(function() {
        loadingMsg.textContent = 'Failed to load timeline.';
      });

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    }());
  </script>
</body>
</html>
