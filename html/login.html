<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Inkwell</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Log In</h1>
      <div id="msg" class="msg"></div>
      <form id="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit">Log In</button>
      </form>
      <div class="alt-link">
        No account yet? <a href="/signup">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    (function initLogin() {
      // If already logged in, go to timeline
      var existing = localStorage.getItem('token') || localStorage.getItem('session_token');
      if (existing) {
        window.location.href = '/';
        return;
      }

      function showMsg(text, type) {
        var el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg show ' + type;
      }

      document.getElementById('auth-form').addEventListener('submit', function handleAuth(e) {
        e.preventDefault();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!username || !password) {
          showMsg('Please fill in all fields.', 'error');
          return;
        }

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
          .then(function handleResponse(res) {
            return res.json().then(function parseBody(data) {
              return { status: res.status, data: data };
            });
          })
          .then(function handleResult(result) {
            if (result.status >= 200 && result.status < 300) {
              var tok = (result.data && (result.data.token || result.data.session_token)) || null;
              if (tok) {
                localStorage.setItem('token', tok);
              }
              showMsg('Logged in! Redirecting…', 'success');
              setTimeout(function goHome() { window.location.href = '/'; }, 600);
            } else {
              var errMsg = (result.data && (result.data.error || result.data.message)) || 'Login failed. Check your credentials.';
              showMsg(errMsg, 'error');
            }
          })
          .catch(function handleError(err) {
            showMsg('Network error: ' + err.message, 'error');
          });
      });
    })();
  </script>
</body>
</html>
