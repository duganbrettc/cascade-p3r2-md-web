<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Inkwell</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <span class="brand">Inkwell</span>
    <a href="/">Timeline</a>
    <a href="/post">Post</a>
    <a href="/profile">Profile</a>
    <a href="/users">Users</a>
    <a href="#" id="logout-link">Logout</a>
  </nav>

  <div class="container profile-page">
    <div class="page-title">Edit Profile</div>
    <div id="msg" class="msg"></div>

    <div class="card">
      <div class="profile-header">
        <h2 id="display-name-heading">—</h2>
        <div class="profile-username" id="username-display"></div>
      </div>

      <form id="profile-form">
        <div class="form-group">
          <label for="display-name">Display Name</label>
          <input id="display-name" name="display_name" type="text" placeholder="Your display name">
        </div>
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" placeholder="Tell the world about yourself…" style="min-height:100px;"></textarea>
        </div>
        <button type="submit">Save Changes</button>
      </form>
    </div>
  </div>

  <script>
    (function initProfilePage() {
      var token = localStorage.getItem('token') || localStorage.getItem('session_token');
      if (!token) {
        window.location.href = '/login';
        return;
      }

      document.getElementById('logout-link').addEventListener('click', function handleLogout(e) {
        e.preventDefault();
        localStorage.removeItem('token');
        localStorage.removeItem('session_token');
        window.location.href = '/login';
      });

      function showMsg(text, type) {
        var el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg show ' + type;
      }

      function loadProfile() {
        fetch('/api/users/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        })
          .then(function handleResponse(res) {
            if (res.status === 401) {
              localStorage.removeItem('token');
              localStorage.removeItem('session_token');
              window.location.href = '/login';
              return null;
            }
            return res.json();
          })
          .then(function populateForm(data) {
            if (!data) return;
            var user = data.user || data;
            document.getElementById('username-display').textContent = '@' + (user.username || '');
            document.getElementById('display-name-heading').textContent = user.display_name || user.username || '—';
            document.getElementById('display-name').value = user.display_name || '';
            document.getElementById('bio').value = user.bio || '';
          })
          .catch(function handleError(err) {
            showMsg('Failed to load profile: ' + err.message, 'error');
          });
      }

      document.getElementById('profile-form').addEventListener('submit', function handleProfileSave(e) {
        e.preventDefault();
        var displayName = document.getElementById('display-name').value.trim();
        var bio = document.getElementById('bio').value.trim();

        fetch('/api/users/me', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ display_name: displayName, bio: bio })
        })
          .then(function handleResponse(res) {
            if (res.status === 401) {
              localStorage.removeItem('token');
              localStorage.removeItem('session_token');
              window.location.href = '/login';
              return null;
            }
            return res.json().then(function parseBody(data) {
              return { status: res.status, data: data };
            });
          })
          .then(function handleResult(result) {
            if (!result) return;
            if (result.status >= 200 && result.status < 300) {
              showMsg('Profile saved!', 'success');
              var user = result.data.user || result.data;
              document.getElementById('display-name-heading').textContent = user.display_name || user.username || '—';
            } else {
              var errMsg = (result.data && (result.data.error || result.data.message)) || 'Failed to save profile.';
              showMsg(errMsg, 'error');
            }
          })
          .catch(function handleError(err) {
            showMsg('Network error: ' + err.message, 'error');
          });
      });

      loadProfile();
    })();
  </script>
</body>
</html>
